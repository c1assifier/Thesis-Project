services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: adaptive_learning
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d adaptive_learning"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/adaptive_learning
      LLM_ENABLED: "false"
      LLM_PROVIDER: ollama
      OLLAMA_URL: http://localhost:11434
      OLLAMA_MODEL: llama3
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173,http://frontend:5173
      CORS_ORIGIN_REGEX: '^https?://(localhost|127\.0\.0\.1|frontend|192\.168\.\d{1,3}\.\d{1,3}|10\.\d{1,3}\.\d{1,3}\.\d{1,3}|172\.(1[6-9]|2\d|3[0-1])\.\d{1,3}\.\d{1,3})(:\d+)?$'
      DIAGNOSTIC_SEED_DATA_PATH: app/data/diagnostic_seed.json
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    command: npm run dev -- --host 0.0.0.0 --port 5173
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
